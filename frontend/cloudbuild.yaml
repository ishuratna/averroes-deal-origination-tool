steps:
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build', 
    '--build-arg', 'NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}', 
    '-t', 'gcr.io/$PROJECT_ID/averroes-deal-frontend', 
    '.'
  ]
images:
- 'gcr.io/$PROJECT_ID/averroes-deal-frontend'
substitutions:
  _NEXT_PUBLIC_API_URL: 'http://localhost:8080' # Default placeholder
