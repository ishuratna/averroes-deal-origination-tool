steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$(gcloud run services describe averroes-deal-backend \
          --region europe-west1 --format='value(status.url)' --project=$PROJECT_ID)
        echo "$$BACKEND_URL" > /workspace/backend_url.txt
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        docker build --build-arg NEXT_PUBLIC_API_URL=$$BACKEND_URL \
          -t gcr.io/$PROJECT_ID/averroes-deal-frontend .
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/averroes-deal-frontend']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        gcloud run deploy averroes-deal-frontend \
          --image gcr.io/$PROJECT_ID/averroes-deal-frontend \
          --region europe-west1 --platform managed --allow-unauthenticated \
          --set-env-vars "NEXT_PUBLIC_API_URL=$$BACKEND_URL" \
          --port 3000 --memory 256Mi --cpu 1 --max-instances 3
images:
  - 'gcr.io/$PROJECT_ID/averroes-deal-frontend'
options:
  logging: CLOUD_LOGGING_ONLY
