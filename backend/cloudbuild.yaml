steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/averroes-deal-backend', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/averroes-deal-backend']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'averroes-deal-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/averroes-deal-backend'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GCS_BUCKET=averroes-deal-intelligence,BIGQUERY_DATASET=averroes_deal_flow,GEMINI_API_KEY=${_GEMINI_API_KEY}'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--max-instances'
      - '3'
images:
  - 'gcr.io/$PROJECT_ID/averroes-deal-backend'
substitutions:
  _GEMINI_API_KEY: ''
options:
  logging: CLOUD_LOGGING_ONLY
